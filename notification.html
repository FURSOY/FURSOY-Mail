<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification</title>
  <style>
    :root {
      --notif-surface: #18181b;
      --notif-surface-update: #1f1808;
      --notif-surface-avatar: #2d2d35;
      --notif-text-strong: #fafafa;
      --notif-text-primary: #f4f4f5;
      --notif-text-secondary: #d4d4d8;
      --notif-text-muted: #71717a;
      --notif-text-subtle: #52525b;
      --notif-text-soft: #a1a1aa;
      --notif-info: #60a5fa;
      --notif-info-hover: #93bbfd;
      --notif-success: #4ade80;
      --notif-success-surface: rgba(34, 197, 94, 0.18);
      --notif-error: #f87171;
      --notif-error-surface: rgba(239, 68, 68, 0.18);
      --notif-warning: #fbbf24;
      --notif-warning-title: #fff7ed;
      --notif-warning-body: #fcd9a8;
      --notif-font-caption: 10px;
      --notif-font-metadata: 10.5px;
      --notif-font-body: 11px;
      --notif-font-title: 12.5px;
      --notif-font-control: 13px;
      --notif-space-xs: 4px;
      --notif-radius-xs: 4px;
      --notif-radius-sm: 5px;
      --notif-radius-full: 9999px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 0;
      background: var(--notif-surface);
      color: var(--notif-text-strong);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #stack {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* ── Single notification card ── */
    .card {
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) 18px;
      gap: 8px;
      align-items: start;
      cursor: pointer;
      position: relative;
      animation: fadeIn 0.2s ease;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .card.removing {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    .card + .card {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .card.update {
      background: var(--notif-surface-update);
    }

    .card.update + .card,
    .card + .card.update {
      border-top-color: rgba(245, 158, 11, 0.18);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar / icon */
    .avatar {
      width: 26px;
      height: 26px;
      border-radius: var(--notif-radius-full);
      flex-shrink: 0;
      background: rgba(59, 130, 246, 0.15);
      color: var(--notif-info);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card.update .avatar {
      background: rgba(245, 158, 11, 0.18);
      color: var(--notif-warning);
    }

    .account-avatar {
      width: 26px;
      height: 26px;
      border-radius: var(--notif-radius-full);
      flex-shrink: 0;
      overflow: hidden;
      background: var(--notif-surface-avatar);
    }

    .account-avatar img {
      width: 100%;
      height: 100%;
      border-radius: var(--notif-radius-full);
      object-fit: cover;
      display: block;
    }

    /* Text block */
    .text-area {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .title {
      font-size: var(--notif-font-title);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--notif-text-primary);
      line-height: 1.3;
    }

    .card.update .title {
      color: var(--notif-warning-title);
    }

    .to-line {
      font-size: var(--notif-font-caption);
      color: var(--notif-text-subtle);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .body {
      font-size: var(--notif-font-body);
      color: var(--notif-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .card.update .body {
      color: var(--notif-warning-body);
    }

    /* Copy button */
    .code-btn {
      width: fit-content;
      margin-top: var(--notif-space-xs);
      padding: 3px 8px;
      border: none;
      border-radius: var(--notif-radius-sm);
      background: rgba(59, 130, 246, 0.12);
      color: var(--notif-info);
      font-size: var(--notif-font-metadata);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      gap: 4px;
      align-items: center;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .code-btn:hover {
      background: rgba(59, 130, 246, 0.22);
      color: var(--notif-info-hover);
    }

    .code-btn.copying {
      cursor: wait;
      opacity: 0.8;
    }

    .code-btn.copied,
    .code-btn.copied:hover {
      background: var(--notif-success-surface);
      color: var(--notif-success);
      cursor: default;
    }

    .code-btn.copy-error,
    .code-btn.copy-error:hover {
      background: var(--notif-error-surface);
      color: var(--notif-error);
    }

    /* Close button */
    .close-btn {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: var(--notif-radius-xs);
      background: transparent;
      color: var(--notif-text-subtle);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--notif-font-control);
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--notif-text-secondary);
    }

    /* Dismiss all bar */
    #dismissAll {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 5px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      font-size: var(--notif-font-metadata);
      color: var(--notif-text-subtle);
      transition: color 0.15s;
    }

    #dismissAll:hover {
      color: var(--notif-text-soft);
    }

    #dismissAll.visible {
      display: flex;
    }

    /* Global progress bar */
    #progressBar {
      width: 100%;
      height: 2px;
      background: rgba(59, 130, 246, 0.4);
      transition: width linear;
      flex-shrink: 0;
    }

    #progressBar.update {
      background: rgba(245, 158, 11, 0.8);
    }
  </style>
</head>

<body>
  <div id="wrapper">
    <div id="stack"></div>
    <div id="progressBar"></div>
    <div id="dismissAll">Tümünü Kapat</div>
  </div>

  <script type="module">
    import { invoke } from '@tauri-apps/api/core';
    import { getCurrentWindow, LogicalSize, LogicalPosition } from '@tauri-apps/api/window';
    import { listen, emitTo } from '@tauri-apps/api/event';
    import { writeText } from '@tauri-apps/plugin-clipboard-manager';

    const win = getCurrentWindow();
    const notifications = [];
    let nextId = 0;
    let screenW = 1920, screenH = 1080;
    const WIN_W = 340;
    const BOTTOM_MARGIN = 64;

    // ── Global timer state ──
    let globalTimer = null;
    let timerStartedAt = 0;
    let timerDuration = 0;
    let unlistenNotification = null;
    const transientTimers = new Set();

    function scheduleTransient(callback, delay) {
      const timer = setTimeout(() => {
        transientTimers.delete(timer);
        callback();
      }, delay);
      transientTimers.add(timer);
      return timer;
    }

    // ── Get screen info ──
    try {
      const info = await invoke('get_screen_info');
      screenW = info[0]; screenH = info[1];
    } catch (e) {
      console.error('[NOTIF] screen info error:', e);
    }

    // ── Resize window to fit content ──
    async function resizeWindow() {
      if (notifications.length === 0) return;

      await new Promise(r => requestAnimationFrame(r));
      const stack = document.getElementById('stack');
      const dismissAll = document.getElementById('dismissAll');
      const progressBar = document.getElementById('progressBar');
      const contentH = Math.ceil(
        stack.getBoundingClientRect().height +
        (dismissAll.classList.contains('visible') ? dismissAll.getBoundingClientRect().height : 0) +
        (progressBar.style.display === 'none' ? 0 : progressBar.getBoundingClientRect().height)
      );

      const x = screenW - WIN_W - 16;
      const y = screenH - contentH - BOTTOM_MARGIN;

      await win.setSize(new LogicalSize(WIN_W, contentH));
      await win.setPosition(new LogicalPosition(x, y));
    }

    // ── Progress bar ──
    function startProgressBar(durationMs, kind = 'mail') {
      const bar = document.getElementById('progressBar');
      bar.className = kind === 'update' ? 'update' : '';
      bar.style.transition = 'none';
      bar.style.width = '100%';
      void bar.offsetWidth;
      bar.style.transition = `width ${durationMs}ms linear`;
      bar.style.width = '0%';
    }

    // ── Global timer ──
    function extendTimer(addMs, kind = 'mail') {
      const now = Date.now();
      let remaining = 0;
      if (globalTimer) {
        const elapsed = now - timerStartedAt;
        remaining = Math.max(timerDuration - elapsed, 0);
        clearTimeout(globalTimer);
      }
      const newDuration = remaining + addMs;
      timerDuration = newDuration;
      timerStartedAt = now;
      globalTimer = setTimeout(dismissAll, newDuration);
      startProgressBar(newDuration, kind);
    }

    function clearGlobalTimer() {
      if (globalTimer) { clearTimeout(globalTimer); globalTimer = null; }
      timerDuration = 0;
      timerStartedAt = 0;
    }

    // ── Render ──
    function render() {
      const stack = document.getElementById('stack');
      stack.innerHTML = '';

      notifications.forEach((n) => {
        const card = document.createElement('div');
        card.className = `card ${n.kind === 'update' ? 'update' : ''}`;
        card.dataset.id = n.id;

        const iconSvg = n.kind === 'update'
          ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
             </svg>`
          : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
             </svg>`;

        const isMulti = n.kind !== 'update' && n.multiAccount;
        const avatarHtml = isMulti && n.accountPicture
          ? `<div class="account-avatar">
               <img src="${escAttr(n.accountPicture)}" width="26" height="26" alt="" />
             </div>`
          : `<div class="avatar">${iconSvg}</div>`;

        const toLineHtml = isMulti && n.accountId
          ? `<div class="to-line">to: ${esc(n.accountId)}</div>`
          : '';

        const copyBtnHtml = n.code
          ? `<button class="code-btn" data-id="${n.id}" data-code="${escAttr(n.code || '')}">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Kopyala (${esc(n.code || '')})
             </button>`
          : '';

        card.innerHTML = `
          ${avatarHtml}
          <div class="text-area">
            <div class="title">${esc(n.title)}</div>
            ${toLineHtml}
            <div class="body">${esc(n.body)}</div>
            ${copyBtnHtml}
          </div>
          <button class="close-btn" data-id="${n.id}">&times;</button>
        `;

        card.addEventListener('click', (e) => {
          if (e.target.closest('.close-btn') || e.target.closest('.code-btn')) return;
          openMailAndDismiss(n.id);
        });

        stack.appendChild(card);
      });

      stack.querySelectorAll('.close-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          dismissById(parseInt(btn.dataset.id));
        });
      });

      stack.querySelectorAll('.code-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          void copyAndDismiss(parseInt(btn.dataset.id), btn.dataset.code);
        });
      });

      document.getElementById('dismissAll').className = notifications.length > 1 ? 'visible' : '';
    }

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function escAttr(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

    // ── Add notification ──
    async function addNotification(data) {
      if (!data) return;
      const id = nextId++;
      const kind = data.kind === 'update' ? 'update' : 'mail';
      notifications.push({
        id, title: data.title, body: data.body, code: data.code || null,
        emailId: data.emailId || null, kind,
        accountId: data.accountId || null,
        accountPicture: data.accountPicture || null,
        multiAccount: !!data.multiAccount,
      });
      render();

      const duration = data.duration !== undefined ? data.duration : 5000;
      const bar = document.getElementById('progressBar');
      if (duration === 0) {
        clearGlobalTimer();
        if (bar) bar.style.display = 'none';
      } else {
        if (bar) bar.style.display = 'block';
        extendTimer(duration, kind);
      }

      await resizeWindow();
      await win.show();
    }

    // ── Dismiss one ──
    function dismissById(id) {
      const idx = notifications.findIndex(n => n.id === id);
      if (idx === -1) return;
      notifications.splice(idx, 1);

      if (notifications.length === 0) {
        clearGlobalTimer();
        win.hide();
        return;
      }

      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) {
        card.classList.add('removing');
        scheduleTransient(() => {
          card.remove();
          document.getElementById('dismissAll').className = notifications.length > 1 ? 'visible' : '';
          resizeWindow();
        }, 250);
      } else {
        render();
        resizeWindow();
      }
    }

    // ── Dismiss all ──
    function dismissAll() {
      clearGlobalTimer();
      notifications.length = 0;
      win.hide();
    }

    // ── Open mail + dismiss ──
    function openMailAndDismiss(id) {
      const notification = notifications.find(n => n.id === id);
      if (notification && notification.kind === 'update') {
        invoke('focus_main_window').catch(() => {});
        emitTo('main', 'open-update-settings').catch(() => {});
      } else if (notification && notification.emailId) {
        invoke('focus_main_window').catch(() => {});
        emitTo('main', 'open-notification-mail', { emailId: notification.emailId, accountId: notification.accountId }).catch(() => {});
      } else {
        invoke('focus_main_window').catch(() => {});
        emitTo('main', 'focus-main-window').catch(() => {});
      }
      dismissById(id);
    }

    // ── Copy code + show result ──
    async function copyAndDismiss(id, code) {
      const button = document.querySelector(`.code-btn[data-id="${id}"]`);
      if (!button || !code || button.dataset.copyState === 'copying' || button.dataset.copyState === 'copied') return;

      button.dataset.copyState = 'copying';
      button.disabled = true;
      button.classList.remove('copy-error');
      button.classList.add('copying');

      try {
        await writeText(code);
        button.dataset.copyState = 'copied';
        button.classList.remove('copying');
        button.classList.add('copied');
        button.innerHTML = `
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          <span>Kopyalandı</span>
        `;
        scheduleTransient(() => dismissById(id), 700);
      } catch (error) {
        console.error('[NOTIF] clipboard error:', error);
        button.dataset.copyState = 'error';
        button.disabled = false;
        button.classList.remove('copying');
        button.classList.add('copy-error');
        button.innerHTML = `
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          <span>Kopyalanamadı · Tekrar dene</span>
        `;
        if (timerDuration > 0) extendTimer(5000);
        await resizeWindow();
      }
    }

    document.getElementById('dismissAll').addEventListener('click', dismissAll);

    // ── Init ──
    try {
      unlistenNotification = await listen('new-notification', (event) => {
        addNotification(event.payload);
      });
      const pending = await invoke('get_pending_notification');
      for (const data of pending) await addNotification(data);
    } catch (e) {
      console.error('[NOTIF] init error:', e);
    }

    window.addEventListener('pagehide', () => {
      clearGlobalTimer();
      for (const timer of transientTimers) clearTimeout(timer);
      transientTimers.clear();
      if (unlistenNotification) unlistenNotification();
      unlistenNotification = null;
    }, { once: true });
  </script>
</body>

</html>
